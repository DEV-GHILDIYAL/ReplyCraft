name: ReplyDesk Review Sync
on:
    schedule:
        - cron: "0 */6 * * *"
    workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Review Sync
              run: |
                  curl -X GET https://replydesk.in/api/cron/sync \
                    -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
